name: Build
on: 
  push: {}
  workflow_dispatch: {}
  schedule:
    - cron: '30 3 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Docker image tag version
        id: image-name
        run: |
          case "$GITHUB_REF" in
            refs/heads/master)
              TAG=latest;;
            *)
              echo "Branch not recognized" >&2
              exit;;
          esac
          : ${TAG:=latest}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=yangzhaofengsteven/bind9:$TAG" >> $GITHUB_OUTPUT
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        if: "github.repository == 'yangzhaofeng/docker-bind9'"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}
      - name: Build multi-arch image
        run: |
          IMAGE="${{ steps.image-name.outputs.name }}"
          PUSH_FLAG="--load"
          if [ "${{ github.repository }}" = "yangzhaofeng/docker-bind9" ]; then
            PUSH_FLAG="--push"
          fi
          docker buildx build --platform linux/amd64,linux/arm64 -t "$IMAGE" .


